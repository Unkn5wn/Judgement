<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Coordinate Formatter: [lat, lon]</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2em; }
    textarea, pre { width: 100%; }
    textarea { height: 220px; }
    pre { border: 1px solid #ccc; background: #fafafa; padding: 1em; min-height: 120px; }
    button { padding: 0.5em 1.5em; font-size: 1em; margin: 1em 0; }
    label { font-weight: bold; }
  </style>
</head>
<body>

  <h2>Coordinate Formatter: <span style="color: #007acc">[lat, lon],</span></h2>
  
  <label for="input">Paste your coordinates (lon,lat,0 per line):</label>
  <textarea id="input" placeholder="Example:&#10;50.3327898,35.5909379,0&#10;50.3363967,35.5796417,0"></textarea>
  
  <br>
  <button onclick="formatCoords()">Format Coordinates</button>
  
  <h3>Result ([lat, lon], per line):</h3>
  <pre id="output"></pre>
  
  <script>
    function formatCoords() {
      const input = document.getElementById('input').value.trim();
      const lines = input.split('\n').map(l => l.trim()).filter(l => l.length > 0);
      const formatted = lines.map(line => {
        // Accepts: "lon,lat,0" (may have spaces)
        const parts = line.split(',');
        if(parts.length >= 2) {
          const lat = parts[1].trim();
          const lon = parts[0].trim();
          // Remove trailing zeros if present
          return `[${lat}, ${lon}],`;
        }
        return '';
      }).filter(l => l.length > 0).join('\n');
      document.getElementById('output').textContent = formatted;
    }
  </script>
</body>
</html>
