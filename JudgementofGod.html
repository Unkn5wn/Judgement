<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Auto City Border Coordinates Fetcher (OSM Overpass)</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {background:#191917;color:#43ED07;font-family:Menlo,Consolas,monospace;}
    .container {max-width:700px;margin:2em auto;padding:2em 2em 2em 2em;border:2px solid #43ED07;background:#191917;}
    h1 {color:#dfffab;text-shadow:0 0 8px #43ED07;}
    input, button {font-family:inherit;font-size:1.04em;color:#43ED07;padding:.38em .4em;background:#191917;border:2px solid #43ED07;}
    button {font-weight:bold;cursor:pointer;}
    button:hover {background:#267304;color:#e5ffc2;border-color:#b8fa3b;}
    #coordsout {white-space:pre-wrap;background:#151714;border:1px solid #43ED07;color:#43ED07;padding:1em;max-width:95%;margin:1.1em 0;font-size:.99em;}
    #status{margin:.7em 0;}
  </style>
</head>
<body>
<div class="container">
<h1>Auto City Border Coordinates (from OSM)</h1>
<form onsubmit="event.preventDefault();getCityBorder();">
  <label>City Name: <input id="city" placeholder="E.g. Mumbai" size=30/></label>
  <button type="submit">Fetch OSM Boundary</button>
</form>
<div id="status"></div>
<div id="coordsout"></div>
<button id="dlKml" style="display:none" onclick="downloadKML()">Download KML</button>
</div>
<script>
let osmCoords = [];
let cityName = "";
async function getCityBorder() {
  document.getElementById("coordsout").textContent = "";
  document.getElementById("status").textContent = "Searching OSM Nominatim…";
  document.getElementById("dlKml").style.display = "none";
  cityName = document.getElementById("city").value.trim();
  if (!cityName) {document.getElementById("status").textContent="Please enter a city name."; return;}
  // 1. Nominatim Lookup
  let nresp = await fetch("https://nominatim.openstreetmap.org/search?format=json&polygon_geojson=1&q="+encodeURIComponent(cityName));
  let ndata = await nresp.json();
  if (!ndata.length) {document.getElementById("status").textContent="City not found!"; return;}
  // Take the biggest boundary (area), or first
  let best = ndata.reduce((a,b)=>((a.geojson&&b.geojson&&(Area(a.geojson)<Area(b.geojson)))?b:a),ndata[0]);
  document.getElementById("status").textContent = "Boundary found: "+(best.display_name||cityName);
  // Poly may be MultiPolygon or Polygon
  let geo = best.geojson;
  let coordsArr = [];
  if (geo.type === "Polygon") coordsArr = geo.coordinates;
  else if (geo.type === "MultiPolygon") coordsArr = geo.coordinates.flat();
  // 2. Show coords
  osmCoords = coordsArr[0].map(pt=>({lon:pt[0],lat:pt[1]}));
  let coordLines = osmCoords.map((p,i)=>`${i+1}. ${p.lon},${p.lat}`).join('\n');
  document.getElementById("coordsout").textContent = `Coordinates of ${best.display_name||cityName} boundary:\n${coordLines}`;
  document.getElementById("dlKml").style.display = "inline-block";
}
// Simple geojson area estimate (for disambiguation)
function Area(gj) {
  // rough: sum of polygon rings using Shoelace theorem, only outer
  function ringarea(ring){
    let area = 0; for(let i=0,j=ring.length-1;i<ring.length;j=i++)
    area+=ring[j][0]*ring[i][1]-ring[i][0]*ring[j][1]; return Math.abs(area/2);
  }
  if(gj.type==='Polygon') return ringarea(gj.coordinates[0]);
  if(gj.type==='MultiPolygon') return gj.coordinates.reduce((a,poly)=>a+ringarea(poly[0]),0);
  return 0;
}
function downloadKML() {
  if (!osmCoords.length) return;
  let coordStr = osmCoords.map(p=>`${p.lon},${p.lat},0`).join('\n        ');
  let kml = `<?xml version="1.0" encoding="UTF-8"?>
<kml xmlns="http://www.opengis.net/kml/2.2">
<Document>
  <Placemark>
    <name>${cityName.replace(/</g,'&lt;').replace(/>/g,'&gt;')}</name>
    <Polygon>
      <outerBoundaryIs>
        <LinearRing>
          <coordinates>
        ${coordStr}
          </coordinates>
        </LinearRing>
      </outerBoundaryIs>
    </Polygon>
  </Placemark>
</Document>
</kml>`;
  let blob = new Blob([kml],{type:"application/vnd.google-earth.kml+xml"});
  let url = URL.createObjectURL(blob);
  let dl = document.createElement('a');
  dl.href = url;
  dl.download = `${cityName.replace(/\W+/g,'_')||"City"}.kml`;
  dl.textContent = "Download KML";
  dl.className = "dl";
  dl.style.display = "none";
  document.body.appendChild(dl);
  setTimeout(()=>{ dl.click(); document.body.removeChild(dl); }, 70);
}
</script>
</body>
</html>
