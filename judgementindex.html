<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CVE Log Tool with Neatly Formatted TXT Export</title>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <style>
    body {background:#f6fbfa;font-family:Segoe UI,Arial,sans-serif;}
    .container {max-width:780px;margin:2em auto;background:#fff;padding:2em 2em 1.5em 2em;border-radius:13px;box-shadow:0 2px 14px 0 rgba(60,100,180,.10);}
    h1 {color:#2b4890;}
    label {font-weight:600;}
    input,select,textarea {font-size:1em;padding:.32em .45em;margin:.26em 0 .5em 0;border-radius:6px;border:1.5px solid #b5d2ec;}
    textarea {min-height:2.3em;width:100%;max-width:100%;}
    th,td {padding:.27em .37em;}
    table {border-collapse:collapse;width:100%;background:#fafdff;margin-top:.8em;}
    th {background:#e6effc;}
    td,th {border:1px solid #e2ecf2;}
    .button-row {margin-top:.6em;}
    button {background: #217fec; color: #fff; font-weight:600; border:none; border-radius:7px; margin:.6em .5em .6em 0; padding:.58em 1.3em;}
    button:hover {background:#195fbb;}
    .tiny {font-size:.97em;color:#444;}
    .checkareas {margin-bottom:.9em;}
    @media(max-width:700px){
      .container {padding:.6em .2em;}
      th,td {font-size:.93em;}
    }
  </style>
</head>
<body>
<div class="container">
  <h1>CVE Log Tool with Aligned TXT Export</h1>
  <form id="logForm" onsubmit="addLogEntry();return false;">
    <div>
      <label>Date: &nbsp;</label>
      <input type="date" id="date" required>
    </div>
    <div>
      <label>CVE Number: &nbsp;</label>
      <input type="text" id="cveNum" required placeholder="e.g. CVE-2026-0001" pattern="CVE-\d{4}-\d{4,}" title="Must be like CVE-2026-0001" style="width:15em">
    </div>
    <div>
      <label>CVSS Version: &nbsp;</label>
      <select id="cvssVer" required>
        <option value="4.0">4.0</option>
        <option value="3.1">3.1</option>
        <option value="2.0">2.0</option>
      </select>
    </div>
    <div>
      <label>CVSS Vector:&nbsp;</label>
      <textarea id="cvssStr" required placeholder="Paste full vector string"></textarea>
    </div>
    <div class="checkareas">
      <label>Areas deciphered:</label><br>
      <input type="checkbox" id="ua"> <label for="ua">Ukraine</label>
      <input type="checkbox" id="ir"> <label for="ir">Iran</label>
      <input type="checkbox" id="cn"> <label for="cn">China</label>
      <input type="checkbox" id="pr"> <label for="pr">Puerto Rico</label>
    </div>
    <div class="button-row">
      <button type="submit">Add to Log</button>
      <button type="button" onclick="downloadTXT()">Download TXT Log</button>
    </div>
  </form>
  <div class="tiny">Log:</div>
  <div id="logTable"></div>
</div>
<script>
const log = [];
document.getElementById('date').valueAsNumber = Date.now() - (new Date()).getTimezoneOffset() * 60000;

function addLogEntry() {
  let date = document.getElementById('date').value || '';
  let cveNum = document.getElementById('cveNum').value.trim();
  let cvssVer = document.getElementById('cvssVer').value;
  let cvssStr = document.getElementById('cvssStr').value.trim();
  let areas = [
    document.getElementById('ua').checked ? "Y" : "",
    document.getElementById('ir').checked ? "Y" : "",
    document.getElementById('cn').checked ? "Y" : "",
    document.getElementById('pr').checked ? "Y" : ""
  ];
  log.unshift([date, cveNum, cvssVer, cvssStr, ...areas]);
  renderLogTable();
  document.getElementById("logForm").reset();
  document.getElementById('date').valueAsNumber = Date.now() - (new Date()).getTimezoneOffset() * 60000;
}

function renderLogTable() {
  let heads = ["Date","CVE Number","CVSS Version","CVSS Vector","Ukraine","Iran","China","Puerto Rico"];
  let tbl = `<table><tr>${heads.map(h=>"<th>"+h+"</th>").join("")}</tr>`;
  for(let row of log) {
    tbl += "<tr>" + row.map((cell,i)=>i>=4?(cell?"✔️":""):"<td>"+cell+"</td>").join("") + "</tr>";
  }
  tbl+="</table>";
  document.getElementById('logTable').innerHTML = tbl;
}

function pad(val, width) {
  let s = String(val || '');
  return s + ' '.repeat(Math.max(0, width - s.length));
}

function downloadTXT() {
  let heads = ["Date","CVE Number","CVSS Version","CVSS Vector","Ukraine","Iran","China","Puerto Rico"];
  let rows = [heads].concat(log);
  // Calculate the max width of each column
  let colWidths = heads.map((_,ci) =>
    Math.max(...rows.map(r=>String(r[ci]||'').length), heads[ci].length)
  );
  // Format each row as fixed-width columns
  let formattedRows = rows.map(r => r.map((cell,ci)=>pad(cell, colWidths[ci])).join('  '));
  let txt = formattedRows.join('\r\n');
  let blob = new Blob([txt], {type:'text/plain'});
  let url = URL.createObjectURL(blob);
  let a = document.createElement('a');
  a.href = url; a.download = "cve_log.txt";
  document.body.appendChild(a); a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url)},140);
}
</script>
</body>
</html>
