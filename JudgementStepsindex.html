<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>CVSS 4.0, 3.1, 2 Vector Number Decipher Tool</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {font-family:Segoe UI,Arial,sans-serif; background:#f7fcfb; color:#146;}
    .container {max-width:700px; margin:2em auto; background:#fff; border-radius:14px; box-shadow:0 2px 12px 0 #c4e3dd4c; padding:2em 2em 2em 2em;}
    h1 {color:#127b86;}
    .instructions {background:#e0f6f2; color:#0e6652; border-left:6px solid #41b28e; padding:1em 1.1em .7em 1.1em; border-radius:8px; margin-bottom:1em;}
    textarea {width:100%; max-width:100%; min-height:46px; font-size:1.1em; border-radius:8px; border:2px solid #b5cff7; background:#f4fafd; padding:.7em; color:#223057;}
    textarea:focus {border:2px solid #5ac2e4; outline:none; background:#fdfffb;}
    button {background:#159c8b; color:#fff; font-size:1.1em; font-weight:600; border:none; border-radius:7px; padding:.47em 1.5em; margin:.7em 0 .6em 0; cursor:pointer;}
    button:hover {background:#117159;}
    #output {font-size:1.09em; margin-top:1.23em;}
    .one-liner {font-family:monospace; background:#f2f9fd; border-radius:8px; padding:.77em .6em .63em .93em; font-size:1.12em;}
    label {margin-left: 1.8em; font-size:1.09em;}
    select {font-size:1.08em; margin-left:.7em;}
    .missing {color:#c81111;}
    @media(max-width:700px){.container{padding:.7em .2em;}}
  </style>
</head>
<body>
<div class="container">
  <h1>CVSS 4.0/3.1/2 Number Decipher Tool</h1>
  <div class="instructions">
    Paste a CVSS vector (v4.0, 3.1, or 2.0), e.g.:<br>
    <b>4.0/AV:N/AC:L/PR:L/UI:N/VC:H/VI:H/VA:H/SC:N/SI:N/SA:N</b><br>
    or<br>
    <b>CVSS:3.1/AV:N/AC:L/PR:L/UI:N/S:U/C:H/I:H/A:H</b><br>
    or<br>
    <b>AV:N/AC:L/Au:N/C:P/I:P/A:P</b> (v2.0).<br>
    Outputs a single line of mapped numbers. <label><input type="checkbox" id="inverseSwitch" onchange="parseDecipher()"> Show Inverse</label>
    <select id="versionSelect" onchange="parseDecipher()">
      <option value="auto">Auto-Detect Version</option>
      <option value="4.0">CVSS v4.0</option>
      <option value="3.1">CVSS v3.1</option>
      <option value="2.0">CVSS v2.0</option>
    </select>
  </div>
  <textarea id="vectorinput" placeholder="Paste a CVSS string..."></textarea><br>
  <button onclick="parseDecipher()">Decipher</button>
  <div id="output"></div>
</div>
<script>
// CVSS v4.0 MAPPING
const mapping40 = {
  SA: 495,    AS: 45,
  N: 14,      M: 13,
  SI: 489,    IS: 253,
  SC: 497,    CS: 97,
  H: 8,       S: 19,
  VA: 573,    AV: 48,
  VI: 581,    IV: 256,
  VC: 575,    CV: 100,
  UI: 633,    IU: 253,
  PR: 434,    RP: 470,
  AT: 46,     TA: 520,
  L: 12,      O: 15,
  AC: 29,     CA: 15,
  AV: 48,     VA2:573 // caveat: duplicate key handled only for the order array
};
const inverses40 = {
  SA: "AS", AS: "SA",
  N: "M",   M: "N",
  SI: "IS", IS: "SI",
  SC: "CS", CS: "SC",
  H: "S",   S: "H",
  VA: "AV", AV: "VA",
  VI: "IV", IV: "VI",
  VC: "CV", CV: "VC",
  UI: "IU", IU: "UI",
  PR: "RP", RP: "PR",
  AT: "TA", TA: "AT",
  L: "O",   O: "L",
  AC: "CA", CA: "AC"
};
const codeOrder40 = [
  "SA",
  "N",
  "SI",
  "SC",
  "H",
  "VA",
  "VI",
  "VC",
  "UI",
  "PR",
  "AT",
  "L",
  "AC",
  "AV" // "AV" comes last so VA ("VA2") handled separately in mapping
];
// CVSS v3.1 MAPPING
const mapping31 = {
  AV: 48,    VA: 573,
  N: 14,     M: 13,
  AC: 29,    CA: 9,
  L: 12,     O: 15,
  PR: 434,   RP: 470,
  UI: 633,   IU: 253,
  S: 19,     H: 8,
  U: 21,     E: 5,
  C: 3,      W: 23,
  I: 9,      Q: 17,
  A: 1,      Z: 26
};
const inverses31 = {
  AV: "VA", VA: "AV",
  N: "M",   M: "N",
  AC: "CA", CA: "AC",
  L: "O",   O: "L",
  PR: "RP", RP: "PR",
  UI: "IU", IU: "UI",
  S: "H",   H: "S",
  U: "E",   E: "U",
  C: "W",   W: "C",
  I: "Q",   Q: "I",
  A: "Z",   Z: "A"
};
const codeOrder31 = [
  "AV","N","AC","L","PR","UI","S","U","C","H","I","A"
];
// CVSS v2.0 MAPPING
const mapping20 = {
  AV: 48,    VA: 573,
  N: 14,     M: 13,
  L: 12,     O: 15,
  Au: 47,    UA: 547,
  S: 19,     H: 8,
  C: 3,      W: 23,
  I: 9,      Q: 17,
  A: 1,      Z: 26
};
const inverses20 = {
  AV: "VA", VA: "AV",
  N: "M",   M: "N",
  L: "O",   O: "L",
  Au:"UA",  UA:"Au",
  S: "H",   H: "S",
  C: "W",   W: "C",
  I: "Q",   Q: "I",
  A: "Z",   Z: "A"
};
const codeOrder20 = [
  "AV","N","L","Au","S","C","I","A"
];

// Auto-detect which version based on prefix/hints
function detectVersion(string) {
  if(/^CVSS:2/i.test(string)) return "2.0";
  if(/^2\.0/i.test(string))    return "2.0";
  if(/^CVSS:3.1/i.test(string)) return "3.1";
  if(/^3\.1/i.test(string)) return "3.1";
  if(/^CVSS:?4\.0/i.test(string)) return "4.0";
  if(/^4\.0/i.test(string)) return "4.0";
  // Heuristic: v2.0: if has "Au:" or "Au=" or "Au/" (metric Au is only in v2)
  if(/\/Au:|\/Au=|\/Au\//.test(string)) return "2.0";
  // Heuristic: v3.1 if contains S:U or S:C and no VC/VI/VA; else 4.0
  if(/\/S:[UC]/.test(string) && !/\/VC:|\/VI:|\/VA:/.test(string)) return "3.1";
  if(/\/VC:|\/VI:|\/VA:/.test(string)) return "4.0";
  // Fallback: v2 format if starts with AV: and only 6-7 metrics
  if(/^AV:/.test(string) && string.split("/").length<=8) return "2.0";
  return "3.1";
}

function parseDecipher() {
  let vector = document.getElementById('vectorinput').value.trim();
  let isInverse = document.getElementById('inverseSwitch').checked;
  let userVer = document.getElementById('versionSelect').value;
  let output=document.getElementById('output');
  if(!vector) {output.innerHTML="<i>No input provided.</i>";return;}
  let version = userVer==="auto" ? detectVersion(vector) : userVer;
  let decMap, invMap, codesUsed, versionString;
  if (version==="4.0")      { decMap=mapping40; invMap=inverses40; codesUsed=codeOrder40; versionString="CVSS v4.0"; }
  else if(version==="3.1")  { decMap=mapping31; invMap=inverses31; codesUsed=codeOrder31; versionString="CVSS v3.1"; }
  else                      { decMap=mapping20; invMap=inverses20; codesUsed=codeOrder20; versionString="CVSS v2.0"; }
  // Remove vector version prefix
  vector = vector.replace(/^CVSS:2\.0\//i,'').replace(/^CVSS:3\.1\//i,'').replace(/^CVSS:?4\.0\//i,'').replace(/^([234]\.0)\//,'');
  let parts = vector.split("/");
  let codes = {};
  for(let seg of parts){ 
    let [k,v] = seg.split(":"); 
    if(!v && seg.includes("=")){ [k,v] = seg.split("=");} // Supports = separator for v2 e.g. AV:N/...
    if(!v && seg.includes("-")){ [k,v] = seg.split("-");}
    k=k.trim(); v=(v||'').trim(); 
    codes[k]=v; 
  }
  let vals = [];
  for(let c of codesUsed){
    let useCode = isInverse ? (invMap[c]||c) : c;
    // In v4.0, if "VA" comes twice, VA last uses VA2
    let vaSpecial = (version==="4.0" && c==="AV" && useCode==="VA");
    let val = (!vaSpecial) ? decMap[useCode] : decMap["VA2"];
    vals.push(val!==undefined?val:"[?]");
  }
  output.innerHTML = `<div class="one-liner" title="${versionString}">${vals.join(" ")}</div>
    <div style="font-size:.97em;color:#048"><em>Version: ${versionString}</em></div>`;
}
</script>
</body>
</html>
